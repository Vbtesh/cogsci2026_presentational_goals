                        <span style="text-align: center; font-size: 80%;"></span></div><div style="border: 1px solid transparent; display: inline-block; position: absolute; left:calc(100% - (50% / 2) - 7.5px); text-align: center; width: 50%;">
                        <span style="text-align: center; font-size: 80%;">That <span style="color:red; font-weight:bold">Red</span> likes <span style="color:green; font-weight:bold">Green</span>.</span>
                    </div>
                </div>`

        var goalsQuestionsHtml = [socialGoalHtml, presentationalGoalHtml];
        var questionOrder = 0;
        if (randomizeQuestionsOrder) {
            questionOrder = Math.floor(Math.random() * 2);
        }
        var goalsQuestionsHtml = [
            goalsQuestionsHtml[questionOrder],
            goalsQuestionsHtml[1 - questionOrder]
        ]
        
        // Ask questions to participants
        var trial_questions = {
            type: jsPsychSurveyHtmlForm,
            preamble: function () {
                return `<h4>Story ${trialIdx + 1} out of ${nTrials} </h4>` +
                    `Please answer the following questions about the story below:`;
            },
            html: `

                ${goalsQuestionsHtml[0]}

                <br>

                ${goalsQuestionsHtml[1]}

                <br>

                <input type="hidden" name="social_goal" id="social_goal_input" value="50">
                <input type="hidden" name="presentational_goal" id="presentational_goal_input" value="50">
                <input type="hidden" name="social_goal_purple" id="social_goal_purple_input" value="50">
            `,
            on_finish: function(data) {
                // Make sure comprehension is removed
                comprehensionOngoing = false;

                // Increment the trial index
                trialIdx++;

                // If trialIndex is above a certain number, skip go the next trial
                if (trialIdx >= endPhaserIndex) {
                    //console.log('End phaser reached, skipping to next trial');
                    endPhaser ++;
                }

                jsPsych.setProgressBar((trialIdx + nComprehensionTrials) / totalTrials);

                // Add the responses to the data

                data['trial_idx'] = trialIdx;

                data['local_idx'] = trialIdx - 1;
                data['social_goal'] = parseInt(data.response.social_goal)
                data['presentational_goal'] = parseInt(data.response.presentational_goal);
                data['social_goal_purple'] = parseInt(data.response.social_goal_purple);

                data['story_id'] = data.vignette.id;
                data['description'] = data.vignette.description;
                data['vignette_1'] = data.vignette.timeline[0];
                data['vignette_2'] = data.vignette.timeline[1];
                data['vignette_3'] = data.vignette.timeline[2];

                // Order of vignettes, if present in data.vignette.timeline[i] then 0 else 1
                if (data.vignette_2.includes('present')) {
                    data['vignette_order'] = 'present';
                } else {
                    data['vignette_order'] = 'absent'
                }
                
                //console.log('Trial responses:', data);
            },
            on_load: function() {

                // Make survey-html-form postion relative
                document.getElementById('jspsych-survey-html-form').style.position = 'relative';
                document.getElementById('jspsych-survey-html-form').style.opacity = '0';
                // Disable the submit button
                var btn = $('#jspsych-survey-html-form input[type="submit"]');
                btn.attr('disabled', 'disabled');
                if (debugMode) {
                    btn.removeAttr('disabled');
                }

                // and enable the submit button if all sliders have been moved
                var sliders = document.querySelectorAll('.slider-ui');
                let sliderClicked = Array.from(sliders).fill(false);

                // Activate the sliders
                $(".slider-ui").each(function() {
                    let sliderId = $(this).attr('id');
                    $(this).slider({
                        orientation: 'horizontal',
                        animate: 'fast',
                        min:0,
                        max:100,
                        step: 1,
                        create: function(event, ui) {
                            $(this).slider("value", 50);
                        },
                        slide: function(event, ui) {
                            // Update the input value
                            $(`#${sliderId}_input`).val(ui.value);
                            // Show the custom handle
                            $(`#custom-handle-${sliderId}`).show()
                            sliderClicked[Array.from(sliders).indexOf(this)] = true;

                            if (sliderClicked.every(clicked => clicked)) {
                                btn.removeAttr('disabled');
                            } else {
                                btn.attr('disabled', 'disabled');
                            }
                        }
                    });
                    $(`#custom-handle-${sliderId}`).hide() 
                });

            

                // Create a container for the stimuli and put in'jspych-content" before the questions
                const container = document.createElement('div');
                container.id = 'stimuli-container';
                container.style.display = 'flex';
                container.style.justifyContent = 'space-between';
                container.style.alignItems = 'center';
                container.style.marginBottom = '20px';
                const jsPsychContent = document.getElementById('jspsych-content');
                jsPsychContent.insertBefore(container, document.getElementById('jspsych-survey-html-form'));

                // Add all the images to the container in the timeline to the container
                let fade = endPhaser;
                // If fade is true, add a fade-in effect to the images and a 3 second delay between each image
                if (fade) {
                    let delay = 0;
                    for (let i = 0; i < jsPsych.timelineVariable('case').timeline.length; i++) {

                        const vignetteDiv = document.createElement('div');
                        vignetteDiv.style.transition = 'opacity 1s ease-in-out';
                        vignetteDiv.style.opacity = '0'; // Start with opacity 0
                        vignetteDiv.style.display = 'flex';
                        vignetteDiv.style.alignItems = 'center';
                        vignetteDiv.style.justifyContent = 'center';
                        vignetteDiv.style.marginRight = '10px';
                        vignetteDiv.style.flexDirection = 'column';
                        container.appendChild(vignetteDiv);

                        // Add the vignette number
                        const vignetteNumber = document.createElement('span');
                        vignetteNumber.innerText = `${i + 1}`;
                        vignetteNumber.style.fontSize = '20px';
                        vignetteNumber.style.marginRight = '10px';
                        vignetteDiv.appendChild(vignetteNumber);
                    
                        // Add the vignette image
                        const vignette = jsPsych.timelineVariable('case').timeline[i];
                        const imgPath = `./images/${vignette}.png`;
                        const img = document.createElement('img');
                        img.src = imgPath;
                        img.style.width = '150px'; // Adjust size as needed
                        img.style.height = 'auto';
                        
                        vignetteDiv.appendChild(img);
                        
                        setTimeout(() => {
                            vignetteDiv.style.opacity = '1'; // Fade in the vignette number
                        }, delay);
                        
                        delay += 3000 * (1 - debugMode); // Increase delay for the next image
                    }

                    // Set opacity of the container to 1 after all images have been added
                    $(`#jspsych-survey-html-form`).css({
                        'transition': 'opacity 1s ease-in-out',
                    });
                    setTimeout(() => {
                        $(`#jspsych-survey-html-form`).css('opacity', '1'); // Fade in the form
                    }, delay);

                    
                } else {
                    $('#jspsych-survey-html-form').css('opacity', '1'); // Set opacity to 1 immediately
                    for (let i = 0; i < jsPsych.timelineVariable('case').timeline.length; i++) {
                        // Add a div for the vignette number and image
                        
                        const vignetteDiv = document.createElement('div');
                        vignetteDiv.style.transition = 'opacity 1s ease-in-out';
                        vignetteDiv.style.display = 'flex';
                        vignetteDiv.style.alignItems = 'center';
                        vignetteDiv.style.justifyContent = 'center';
                        vignetteDiv.style.marginRight = '10px';
                        vignetteDiv.style.flexDirection = 'column';
                        container.appendChild(vignetteDiv);

                        // Add the vignette number
                        const vignetteNumber = document.createElement('span');
                        vignetteNumber.innerText = `${i + 1}`;
                        vignetteNumber.style.fontSize = '20px';
                        vignetteNumber.style.marginRight = '10px';
                        vignetteDiv.appendChild(vignetteNumber);
                    
                        // Add the vignette image
                        const vignette = jsPsych.timelineVariable('case').timeline[i];
                        const imgPath = `./images/${vignette}.png`;
                        const img = document.createElement('img');
                        img.src = imgPath;
                        img.style.width = '150px'; // Adjust size as needed
                        img.style.height = 'auto';
                        
                        vignetteDiv.appendChild(img);
                    }
                }
            },
            data: {
                trial: 'trial',
                vignette: jsPsych.timelineVariable('case'),
            },
        };

        // -----------------------------------------------------
        // Define the trials for the main experiment
        // -----------------------------------------------------
        var blockPrefFirst = null;
        var timelineVariables = [];
        var trials;
        if (!separatePrefs) {

            // Trials cases
            for (let i=0; i < trialsCases.length; i++) {
                if (trialsCases[i].trial.use == true) {
                    timelineVariables.push({case: trialsCases[i]});
                }
            }

            trials = [{
                timeline_variables: timelineVariables,
                timeline: [
                    trial_pres, 
                    trial_questions, 
                    continue_page
                ],
                choices: ['Continue'],
                randomize_order: true,
            }];

        } else {

            blockPrefFirst = jsPsych.randomization.shuffle(['competitive', 'complementary'])[0];
            console.log('Block preference first:', blockPrefFirst);

            let competitiveTrialsCases = [];
            let complementaryTrialsCases = [];
            for (let i=0; i < trialsCases.length; i++) {
                if (trialsCases[i].trial.use == true) {
                    // Randomize the second and third vignettes
                    var trialCase = trialsCases[i];
                    if (randomizeSecondThirdVignettes) {
                        trialCase.timeline = [
                            ...trialsCases[i].timeline.slice(0, 1),
                            ...jsPsych.randomization.shuffle(trialsCases[i].timeline.slice(1, 3))
                        ];
                    } 

                    if (trialCase.id.split('-')[0] == 'competitive') {
                        competitiveTrialsCases.push({case: trialCase});
                    } else if (trialCase.id.split('-')[0] == 'complementary') {
                        complementaryTrialsCases.push({case: trialCase});
                    }
                }
            }
            
            let competitiveTrials = {
                timeline_variables: competitiveTrialsCases,
                timeline: [
                    trial_pres, 
                    trial_questions, 
                    continue_page
                ],
                choices: ['Continue'],
                randomize_order: true,
            };
            let complementaryTrials = {
                timeline_variables: complementaryTrialsCases,
                timeline: [
                    trial_pres,
                    trial_questions,
                    continue_page
                ],
                choices: ['Continue'],
                randomize_order: true,
            };

            let competitiveNotif = `
                <p>For the next few stories, <span style="color:red; font-weight:bold">Red</span> and <span style="color:green; font-weight:bold">Green</span> will both prefer Apples.
                <br>
                <img src="./images/sim_R-A_G-A_P-present.png" style="width: 200px; height: auto; margin-top: 10px; margin-bottom: 10px;">
                <br>
                Click below to proceed to the next story.</p>
            `;
            let complementaryNotif = `
                <p>For the next few stories, <span style="color:red; font-weight:bold">Red</span> will prefer Oranges and <span style="color:green; font-weight:bold">Green</span> will prefer Apples.
                <br>
                <img src="./images/sim_R-O_G-A_P-present.png" style="width: 200px; height: auto; margin-top: 10px; margin-bottom: 10px;">
                <br>
                Click below to proceed to the next story.</p>
            `;

            // Create trials
            if (blockPrefFirst == 'competitive') {
                trials = [
                    {
                        type: jsPsychHtmlButtonResponse,
                        stimulus: competitiveNotif,
                        choices: ['Continue'],
                    },
                    competitiveTrials, 
                    {
                        type: jsPsychHtmlButtonResponse,
                        stimulus: complementaryNotif,
                        choices: ['Continue'],
                    },
                    complementaryTrials
                ];
            } else {
                trials = [
                    {
                        type: jsPsychHtmlButtonResponse,
                        stimulus: complementaryNotif,
                        choices: ['Continue'],
                    },
                    complementaryTrials, 
                    {
                        type: jsPsychHtmlButtonResponse,
                        stimulus: competitiveNotif,
                        choices: ['Continue'],
                    },
                    competitiveTrials
                ];
            }

            
        }


        // -----------------------------------------------------
        // feedback and demographic info
        // -----------------------------------------------------
        // note: Prolific collects: country of birth, current country of
        //       residence, employment status, first language, nationality,
        //       sex, and student status
        // form in js/feedback-demographics.js


        // -----------------------------------------------------
        // save data to datapipe
        // -----------------------------------------------------
        const unique_id = jsPsych.randomization.randomID(10);
        const prolific_id = jsPsych.data.getURLVariable('PROLIFIC_PID');
        const experiment_id = "DATA_COLLECTION_OVER"

        const fileID = prolific_id? prolific_id : unique_id;

        const save_trial_data = {
            type: jsPsychPipe,
            action: 'save',
            // TODO: ADD EXPERIMENT ID FROM DATAPIPE
            experiment_id: experiment_id,
            filename: `${fileID}_trials.csv`,
            data_string: () => {
                // Only get the trials objects where trial_type is 'survey-html-form'
                const data = jsPsych.data.get().filter({trial_type: 'survey-html-form', trial: 'trial'}).values();
                // this assumes each trial data contains "trial" and "response" fields
                const trials = data.flatMap((t) => {
                    return [
                        unique_id,
                        prolific_id, 
                        separatePrefs,
                        randomizeSecondThirdVignettes,
                        questionOrder == 0 ? 'social_goal' : 'presentational_goal',
                        blockPrefFirst,
                        t.trial_index,
                        t.trial, 
                        t.local_idx,
                        t.story_id,
                        t.description,
                        t.vignette_1,
                        t.vignette_2,
                        t.vignette_3,
                        t.vignette_order,
                        t.rt,
                        t.time_elapsed,
                        t.social_goal,
                        t.presentational_goal,
                        t.social_goal_purple,
                    ].join(',');
                });
                const header = [
                    'id', 
                    'prolific_id',
                    'separatePref',
                    'randomizeVignettes',
                    'questionOrder',
                    'blockPrefFirst',
                    'trial_idx', 
                    'trial_type', 
                    'local_idx',
                    'story_id',
                    'description',
                    'vignette_1',
                    'vignette_2',
                    'vignette_3',
                    'vignette_order',
                    'rt', 
                    'time_elapsed', 
                    'social_goal', 
                    'presentational_goal', 
                    'social_goal_purple'
                ].join(',');
                const trials_csv = [header, ...trials].join('\n');
                return trials_csv;
            }
        };

        const save_participant_data = {
            type: jsPsychPipe,
            action: 'save',
            experiment_id: experiment_id,
            filename: `${fileID}_participant.csv`,
            data_string: () => {
                const time = TimeMe.getTimeOnPageInSeconds('page');
                const data = jsPsych.data.get().filter({trial_type: 'survey-html-form', trial: 'demographics'}).values()[0]['response'];

                //console.log('Participant data:', data);
                
                if (!data) {
                    console.error("No survey data found");
                    return "";
                }
                
                const participant = [
                    unique_id,
                    prolific_id,
                    'demographics',
                    `"${data.feedback || ""}"`,
                    data.age || "",
                    data.gender || "",
                    data.race || "",
                    `"${data.ethnicity || ""}"`,
                    time
                ].join(',');
                const header = 'id,prolific_id,trial_type,feedback,age,gender,race,ethnicity,time';
                const participant_csv = header + '\n' + participant;
                //console.log(participant_csv);
                return participant_csv;
            }
        };


        // Final screen
        const final_screen = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="scenario-container">
                    <h2>Thank you!</h2>
                    <p>You have completed the study. Your responses have been recorded.</p>
                    <p><a href=${prolific_return_url}>Click here to go back to Prolific</a></p>
                </div>
            `,
            choices: 'NO_KEYS'
        };
        
        
        // -----------------------------------------------------
        // compile timeline
        // -----------------------------------------------------
        var timeline = [];
        timeline.push(preload_trial);
        timeline.push(consent);
        timeline.push(comprehension_instructions);
        timeline.push(...comprehension_loops);
        timeline.push(trial_instructions);
        timeline.push(...trials);
        timeline.push(feedback_demographics);
        timeline.push(save_trial_data);
        timeline.push(save_participant_data);
        timeline.push(final_screen);


        // -----------------------------------------------------
        // run timeline
        // -----------------------------------------------------
        jsPsych.run(timeline);


    </script>
